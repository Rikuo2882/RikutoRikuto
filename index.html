<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配当ポートフォリオ管理</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#fff;--bg2:#f5f5f3;--bg-info:#e6f1fb;--bg-green:#e1f5ee;--text:#1a1a18;--text2:#5f5e5a;--text3:#888780;--text-info:#185fa5;--text-green:#085041;--border:rgba(0,0,0,.11);--green:#0f6e56;--red:#a32d2d;--blue:#185fa5;--r:10px;--rl:14px}
  @media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#262623;--bg-info:#0c2a45;--bg-green:#04342c;--text:#f0ede8;--text2:#b4b2a9;--text3:#888780;--text-info:#85b7eb;--text-green:#9fe1cb;--border:rgba(255,255,255,.1);--green:#5dcaa5;--red:#f09595;--blue:#85b7eb}}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;line-height:1.6}
  .header{background:var(--bg);border-bottom:.5px solid var(--border);padding:1rem 1.5rem;position:sticky;top:0;z-index:10}
  .header-inner{max-width:1250px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
  .app-title{font-size:17px;font-weight:500}.app-sub{font-size:12px;color:var(--text3);margin-top:2px}
  .update-btn{display:flex;align-items:center;gap:6px;padding:.45rem 1rem;font-size:13px;border-radius:99px;border:.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;white-space:nowrap}
  .update-btn:hover{background:var(--bg2)}.update-btn.loading{opacity:.6;pointer-events:none}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}.dot.pulsing{background:#f0c040;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .container{max-width:1250px;margin:0 auto;padding:1.5rem}
  .mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1.5rem}
  .mc{background:var(--bg);border-radius:var(--r);padding:1rem 1.1rem;border:.5px solid var(--border)}
  .mc.ac{background:var(--bg-info);border-color:transparent}
  .ml{font-size:11px;color:var(--text2);margin-bottom:.35rem;line-height:1.4}.mc.ac .ml{color:var(--text-info);opacity:.85}
  .mv{font-size:22px;font-weight:500;color:var(--text);line-height:1.1}.mc.ac .mv{color:var(--text-info)}
  .ms{font-size:11px;color:var(--text3);margin-top:.3rem}.mc.ac .ms{color:var(--text-info);opacity:.65}
  .tab-bar{display:flex;gap:4px;margin-bottom:1.25rem;flex-wrap:wrap}
  .tab-btn{padding:.4rem 1rem;font-size:13px;border-radius:99px;border:.5px solid var(--border);cursor:pointer;background:transparent;color:var(--text2);font-family:inherit}
  .tab-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
  .card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem}
  .sl{font-size:11px;letter-spacing:.07em;color:var(--text3);text-transform:uppercase;margin-bottom:.85rem}
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:1150px}
  th{text-align:left;font-size:11px;color:var(--text3);font-weight:400;padding:.55rem .6rem;border-bottom:.5px solid var(--border);white-space:nowrap}
  th:not(:first-child){text-align:right}
  td{padding:.7rem .6rem;border-bottom:.5px solid var(--border);color:var(--text);vertical-align:middle}
  td:not(:first-child){text-align:right}
  tr:last-child td{border-bottom:none}
  .tm{font-weight:500;font-size:14px}.ts{font-size:11px;color:var(--text2);margin-top:2px}
  .pos{color:var(--green)}.neg{color:var(--red)}
  .badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500;white-space:nowrap}
  .badge-soon{background:#fcebeb;color:#a32d2d}.badge-normal{background:#eaf3de;color:#3b6d11}.badge-upcoming{background:#e6f1fb;color:#185fa5}
  @media(prefers-color-scheme:dark){.badge-soon{background:#501313;color:#f09595}.badge-normal{background:#173404;color:#c0dd97}.badge-upcoming{background:#042c53;color:#85b7eb}}
  .tag-yoc{font-size:10px;padding:1px 5px;background:#e1f5ee;color:#085041;border-radius:4px;font-weight:500}
  @media(prefers-color-scheme:dark){.tag-yoc{background:#04342c;color:#5dcaa5}}
  .tag-auto{font-size:10px;color:var(--green);margin-left:3px}
  .del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:2px 6px;border-radius:4px;line-height:1;font-family:inherit}
  .del-btn:hover{color:var(--red);background:var(--bg2)}
  .edit-btn,.move-btn{background:none;border:.5px solid var(--border);cursor:pointer;color:var(--text2);font-size:12px;padding:3px 8px;border-radius:6px;font-family:inherit;white-space:nowrap}
  .edit-btn:hover,.move-btn:hover{background:var(--bg2)}
  .save-btn{background:var(--text);color:var(--bg);border:none;cursor:pointer;font-size:12px;padding:4px 10px;border-radius:6px;font-family:inherit}
  .cancel-btn{background:none;border:.5px solid var(--border);cursor:pointer;color:var(--text2);font-size:12px;padding:3px 8px;border-radius:6px;font-family:inherit}
  .edit-input{width:100%;height:28px;padding:0 6px;border-radius:6px;border:.5px solid var(--blue);background:var(--bg);color:var(--text);font-size:12px;font-family:inherit;text-align:right}
  tr.editing{background:var(--bg-info)}
  .info-box{background:var(--bg2);border-radius:var(--r);padding:.85rem 1rem;margin-bottom:1rem;font-size:12px;color:var(--text2);line-height:1.7}
  .info-box strong{color:var(--text)}
  .yoc-box{background:var(--bg-info);border-radius:var(--r);padding:.85rem 1rem;margin-bottom:1rem;font-size:12px;color:var(--text-info);line-height:1.7;border-left:3px solid var(--blue)}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:10px}
  .form-group{display:flex;flex-direction:column;gap:4px}
  .form-label{font-size:11px;color:var(--text2)}
  .form-group input,.form-group select{height:36px;padding:0 10px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;width:100%}
  .btn-primary{height:38px;padding:0 20px;font-size:13px;border-radius:var(--r);border:none;background:var(--text);color:var(--bg);cursor:pointer;font-family:inherit;font-weight:500;width:100%;margin-top:4px}
  .btn-primary:hover{opacity:.85}
  .bar-list{display:flex;flex-direction:column;gap:10px}.bar-row{display:flex;align-items:center;gap:10px;font-size:12px}
  .bar-ticker{width:100px;color:var(--text2);font-size:11px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{flex:1;height:22px;background:var(--bg2);border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
  .bar-val{width:70px;font-size:12px;font-weight:500;flex-shrink:0}
  .legend-row{display:flex;gap:16px;margin-bottom:.85rem;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
  .legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .cal-month-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:.85rem}
  .cal-item{display:flex;justify-content:space-between;align-items:center;padding:.6rem 0;border-bottom:.5px solid var(--border);gap:1rem}.cal-item:last-child{border-bottom:none}
  .hist-item{display:flex;justify-content:space-between;align-items:center;padding:.65rem 0;border-bottom:.5px solid var(--border);gap:1rem}.hist-item:last-child{border-bottom:none}
  .pie-container{display:flex;gap:2rem;flex-wrap:wrap;justify-content:center;margin-bottom:1rem}
  .pie-wrap{display:flex;flex-direction:column;align-items:center;flex:1;min-width:250px}
  .pie-legend{display:flex;flex-direction:column;gap:6px;margin-top:1rem;width:100%}
  .pie-legend-item{display:flex;align-items:center;gap:8px;font-size:12px;justify-content:space-between}
  .pie-legend-left{display:flex;align-items:center;gap:8px}
  .pie-legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
  .empty-state{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:13px}
  .footnote{font-size:11px;color:var(--text3);margin-top:.5rem}
  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:.6rem 1.25rem;border-radius:99px;font-size:13px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1}
  @media(max-width:600px){.container{padding:1rem}.header{padding:.85rem 1rem}.mg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header class="header"><div class="header-inner">
  <div><div class="app-title">配当ポートフォリオ</div><div class="app-sub">取得ベース配当利回り（YoC）＋ 配当込み実質損益</div></div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div style="font-size:11px;color:var(--text3)" id="updated-date"></div>
    <button class="update-btn" id="update-btn" onclick="updatePrices()"><span class="dot" id="status-dot"></span><span id="update-label">株価を更新</span></button>
  </div>
</div></header>
<div class="container">
  <div class="mg" id="summary"></div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('holdings')">保有銘柄</button>
    <button class="tab-btn" onclick="switchTab('calendar')">配当カレンダー</button>
    <button class="tab-btn" onclick="switchTab('analysis')">利益分析</button>
    <button class="tab-btn" onclick="switchTab('history')">配当受取履歴</button>
    <button class="tab-btn" onclick="switchTab('add')">＋ 銘柄追加</button>
    <button class="tab-btn" onclick="switchTab('settings')">⚙ 設定</button>
  </div>
  <div id="pane-holdings"></div><div id="pane-calendar" style="display:none"></div><div id="pane-analysis" style="display:none"></div><div id="pane-history" style="display:none"></div><div id="pane-add" style="display:none"></div><div id="pane-settings" style="display:none"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const SK='dp-stocks-v4',HK='dp-hist-v2',PK='dp-proxy-url',RK='dp-usdjpy';
const COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1','#14b8a6','#e11d48'];

const DEF_STOCKS=[
  {id:1,ticker:'8306',name:'三菱UFJ FG',shares:100,buyPrice:1000,currentPrice:1580,annualDividend:60,exDates:['03-31','09-30']},
  {id:2,ticker:'8316',name:'三井住友FG',shares:100,buyPrice:1000,currentPrice:3800,annualDividend:120,exDates:['03-31','09-30']},
  {id:3,ticker:'8411',name:'みずほFG',shares:100,buyPrice:1000,currentPrice:3600,annualDividend:130,exDates:['03-31','09-30']},
];
const DEF_HIST=[
  {id:'d1',ticker:'8306',stockName:'三菱UFJ FG',date:'2025-12-05',amount:3000,memo:'中間配当'},
  {id:'d2',ticker:'8306',stockName:'三菱UFJ FG',date:'2025-06-25',amount:3000,memo:'期末配当'},
  {id:'d3',ticker:'8316',stockName:'三井住友FG',date:'2025-12-05',amount:6000,memo:'中間配当'},
  {id:'d4',ticker:'8316',stockName:'三井住友FG',date:'2025-06-25',amount:6000,memo:'期末配当'},
  {id:'d5',ticker:'8411',stockName:'みずほFG',date:'2025-12-05',amount:6500,memo:'中間配当'},
  {id:'d6',ticker:'8411',stockName:'みずほFG',date:'2025-06-25',amount:6500,memo:'期末配当'},
];

function load(k,d){try{const s=localStorage.getItem(k);return s?JSON.parse(s):d}catch(e){return d}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

function migrateOldData(){
  if(localStorage.getItem(SK))return;
  const oldStockKeys=['dividend-portfolio-v3','dividend-portfolio-v2','dividend-portfolio-v1'];
  let oldStocks=null;
  for(const k of oldStockKeys){const s=localStorage.getItem(k);if(s){try{oldStocks=JSON.parse(s);break}catch(e){}}}
  if(!oldStocks)return;
  let oldHist=[];
  const h=localStorage.getItem('dividend-history-v1');
  if(h){try{oldHist=JSON.parse(h)}catch(e){}}
  const migratedHist=[...oldHist];
  oldStocks.forEach(s=>{
    if(s.receivedDividend&&s.receivedDividend>0){
      const hs=oldHist.filter(x=>x.ticker===s.ticker).reduce((a,x)=>a+x.amount,0);
      const diff=s.receivedDividend-hs;
      if(diff>0)migratedHist.push({id:'migrated-'+s.ticker,ticker:s.ticker,stockName:s.name,date:new Date().toISOString().slice(0,10),amount:diff,memo:'旧バージョンからの引き継ぎ'});
    }
    delete s.receivedDividend;
  });
  localStorage.setItem(SK,JSON.stringify(oldStocks));
  localStorage.setItem(HK,JSON.stringify(migratedHist));
  setTimeout(()=>{try{showToast('✓ 以前のデータを自動で引き継ぎました')}catch(e){}},500);
}
migrateOldData();

let stocks=load(SK,DEF_STOCKS),hist=load(HK,DEF_HIST);
const today=new Date();

// 米国株で円とドルが混在してしまったデータを自動修正
function sanitizeUSD(){
  const r=parseFloat(localStorage.getItem(RK))||150;
  let fixed=false;
  stocks.forEach(s=>{
    if((s.currency||'JPY')!=='USD')return;
    // 配当利回りが50%超 → 配当が円のまま入っている
    if(s.currentPrice>0&&s.annualDividend/s.currentPrice>0.5){
      s.annualDividend=Math.round(s.annualDividend/r*100)/100;fixed=true;
    }
    // 取得単価が現在株価の5倍超 → 取得単価が円のまま入っている
    if(s.currentPrice>0&&s.buyPrice/s.currentPrice>5){
      s.buyPrice=Math.round(s.buyPrice/r*100)/100;fixed=true;
    }
  });
  if(fixed){save(SK,stocks);setTimeout(()=>{try{showToast('✓ 米国株の通貨単位を自動修正しました')}catch(e){}},600)}
}
sanitizeUSD();

function getRate(){const r=parseFloat(localStorage.getItem(RK));return r&&r>0?r:150}
function curOf(s){return s.currency||'JPY'}
function isUSTicker(t){return /^[A-Za-z][A-Za-z0-9.\-]*$/.test(t)}

// 通貨対応フォーマット
function fmtMoney(n,cur){
  if(cur==='USD')return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return '¥'+Math.round(n).toLocaleString('ja-JP');
}
const fmtYen=n=>'¥'+Math.round(n).toLocaleString('ja-JP');
const fmtPct=n=>(n>=0?'+':'')+n.toFixed(2)+'%';
const fmtDate=d=>d?`${d.getMonth()+1}月${d.getDate()}日`:'—';

// 履歴の受取額（指定通貨に換算して返す）
function getReceivedDiv(ticker,cur='JPY'){
  const rate=getRate();
  return hist.filter(h=>h.ticker===ticker).reduce((a,h)=>{
    const hc=h.currency||'JPY';let v=h.amount;
    if(hc!==cur)v=hc==='USD'?v*rate:v/rate;
    return a+v;
  },0);
}
function getTotalReceivedJPY(){
  const rate=getRate();
  return hist.reduce((a,h)=>a+((h.currency||'JPY')==='USD'?h.amount*rate:h.amount),0);
}

function calcStock(s){
  const cur=curOf(s);
  const cost=s.buyPrice*s.shares,mv=s.currentPrice*s.shares;
  const rcv=getReceivedDiv(s.ticker,cur);
  const capGain=mv-cost,totalGain=capGain+rcv;
  const capPct=cost?capGain/cost*100:0,totalPct=cost?totalGain/cost*100:0;
  const yocPct=s.buyPrice?s.annualDividend/s.buyPrice*100:0;
  const curYield=s.currentPrice?s.annualDividend/s.currentPrice*100:0;
  const annualIncome=s.annualDividend*s.shares;
  const nextEx=nextExDate(s.exDates);
  const daysUntil=nextEx?Math.ceil((nextEx-today)/864e5):null;
  return{cur,cost,mv,rcv,capGain,totalGain,capPct,totalPct,yocPct,curYield,annualIncome,nextEx,daysUntil};
}
function toJPY(n,cur){return cur==='USD'?n*getRate():n}
function nextExDate(ex){if(!ex||!ex.length)return null;const yr=today.getFullYear();return ex.map(d=>{const[m,day]=d.split('-').map(Number);let dt=new Date(yr,m-1,day);if(dt<=today)dt=new Date(yr+1,m-1,day);return dt}).sort((a,b)=>a-b)[0]}

// ── データ取得（プロキシ経由でYahoo Finance / 投信協会） ──
function getProxyUrl(){return localStorage.getItem(PK)||''}

async function fetchViaProxies(url){
  const proxies=[
    u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
    u=>'https://corsproxy.io/?url='+encodeURIComponent(u),
  ];
  for(const p of proxies){
    try{
      const res=await fetch(p(url),{signal:AbortSignal.timeout(12000)});
      if(res.ok)return res;
    }catch(e){}
  }
  // 最後に直接アクセスも試す
  try{
    const res=await fetch(url,{signal:AbortSignal.timeout(8000)});
    if(res.ok)return res;
  }catch(e){}
  return null;
}

// 株式（日本株・米国株）
async function fetchStockData(s){
  const symbol=isUSTicker(s.ticker)?s.ticker:s.ticker+'.T';
  // GASプロキシ（設定されていれば最優先）
  const gas=getProxyUrl();
  if(gas){
    try{
      const res=await fetch(gas+'?ticker='+symbol,{signal:AbortSignal.timeout(8000)});
      const d=await res.json();
      if(d.price)return{price:d.price,dividend:d.dividend||null,currency:isUSTicker(s.ticker)?'USD':'JPY'};
    }catch(e){}
  }
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1y&events=div`;
  const res=await fetchViaProxies(url);
  if(!res)return{price:null,dividend:null,currency:null};
  try{
    const d=await res.json();
    const result=d?.chart?.result?.[0];
    const price=result?.meta?.regularMarketPrice;
    const currency=result?.meta?.currency||null;
    let dividend=null,exDates=null;
    if(result?.events?.dividends){
      const oneYearAgo=Date.now()/1000-365*86400;
      const recent=Object.values(result.events.dividends).filter(x=>x.date>=oneYearAgo);
      dividend=recent.reduce((a,x)=>a+x.amount,0);
      dividend=Math.round(dividend*100)/100;
      // 権利落ち日を過去の配当イベントから自動設定（MM-DD形式）
      const dates=recent.map(x=>{const d=new Date(x.date*1000);return String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')});
      exDates=[...new Set(dates)].sort();
    }
    return{price:price||null,dividend:dividend||null,currency,exDates:exDates&&exDates.length?exDates:null};
  }catch(e){return{price:null,dividend:null,currency:null}}
}

// 投資信託（投信協会CSV → Yahoo!ファイナンスの順に試行）
async function fetchFundData(code){
  // ① 投信協会CSV（パラメータ2パターン試行）
  const csvUrls=[
    `https://toushin-lib.fwg.ne.jp/FdsWeb/FDST030000/csv-file-download?isinCd=&associFundCd=${encodeURIComponent(code)}`,
    `https://toushin-lib.fwg.ne.jp/FdsWeb/FDST030000/csv-file-download?associFundCd=${encodeURIComponent(code)}`
  ];
  for(const u of csvUrls){
    const res=await fetchViaProxies(u);
    if(!res)continue;
    try{
      const text=await res.text();
      const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l&&l.includes(','));
      if(lines.length<2)continue;
      const last=lines[lines.length-1].split(',');
      const price=parseFloat((last[1]||'').replace(/[^0-9.]/g,''));
      let dividend=0;const exSet=new Set();
      const oneYearAgo=new Date();oneYearAgo.setFullYear(oneYearAgo.getFullYear()-1);
      for(const line of lines.slice(1)){
        const cols=line.split(',');
        const dm=cols[0].match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
        if(!dm)continue;
        const dt=new Date(+dm[1],+dm[2]-1,+dm[3]);
        const div=parseFloat((cols[3]||'').replace(/[^0-9.]/g,''));
        if(dt>=oneYearAgo&&div>0){dividend+=div;exSet.add(String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'))}
      }
      if(price&&price>0){
        const ex=[...exSet].sort();
        return{price,dividend:dividend>0?Math.round(dividend*10)/10:null,exDates:ex.length?ex:null};
      }
    }catch(e){}
  }
  // ② Yahoo!ファイナンス（日本）のファンドページから基準価額を抽出
  try{
    const res=await fetchViaProxies(`https://finance.yahoo.co.jp/quote/${encodeURIComponent(code)}`);
    if(res){
      const html=await res.text();
      let m=html.match(/"price"\s*:\s*"?([0-9][0-9,]*\.?[0-9]*)/);
      if(!m)m=html.match(/基準価額[\s\S]{0,300}?([0-9][0-9,]{3,})/);
      if(m){const p=parseFloat(m[1].replace(/,/g,''));if(p>0)return{price:p,dividend:null,exDates:null}}
    }
  }catch(e){}
  return{price:null,dividend:null,exDates:null};
}

async function updatePrices(){
  const btn=document.getElementById('update-btn'),dot=document.getElementById('status-dot');
  btn.classList.add('loading');dot.classList.add('pulsing');
  document.getElementById('update-label').textContent='取得中...';
  showToast('株価・基準価額・為替を取得中...（少し時間がかかります）');
  // 為替レート取得
  try{
    const res=await fetchViaProxies('https://query1.finance.yahoo.com/v8/finance/chart/USDJPY=X?interval=1d&range=1d');
    if(res){const d=await res.json();const r=d?.chart?.result?.[0]?.meta?.regularMarketPrice;if(r&&r>0)localStorage.setItem(RK,String(r))}
  }catch(e){}
  let ok=0,ng=0;
  for(const s of stocks){
    let data;
    if(s.isFund){data=await fetchFundData(s.ticker)}
    else{data=await fetchStockData(s)}
    // 通貨がJPY→USDに切り替わった場合、円で入力済みの取得単価・配当をドルに自動換算
    if(data.currency==='USD'&&curOf(s)!=='USD'){
      const r=getRate();
      s.buyPrice=Math.round(s.buyPrice/r*100)/100;
      if(!(data.dividend&&data.dividend>0))s.annualDividend=Math.round(s.annualDividend/r*100)/100;
      s.currency='USD';
    }
    if(data.price){
      s.currentPrice=curOf(s)==='USD'||s.isFund?Math.round(data.price*100)/100:Math.round(data.price);
      s.priceUpdated=true;ok++;
    }else{s.priceUpdated=false;ng++}
    if(data.dividend&&data.dividend>0)s.annualDividend=data.dividend;
    if(data.exDates&&data.exDates.length)s.exDates=data.exDates;
  }
  sanitizeUSD();
  save(SK,stocks);btn.classList.remove('loading');dot.classList.remove('pulsing');
  document.getElementById('update-label').textContent='株価を更新';
  const now=new Date();document.getElementById('updated-date').textContent=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 更新（$1=¥${getRate().toFixed(1)}）`;
  showToast(ng===0?`✓ ${ok}銘柄を更新しました`:ok>0?`${ok}銘柄更新 / ${ng}銘柄は取得不可（時間をおいて再試行を）`:'取得失敗。時間をおいて再試行してください');
  renderAll();
}

function moveStock(id,dir){const idx=stocks.findIndex(s=>s.id===id);if(idx<0)return;const ni=idx+dir;if(ni<0||ni>=stocks.length)return;[stocks[idx],stocks[ni]]=[stocks[ni],stocks[idx]];save(SK,stocks);renderAll()}

function pieChart(data,size=180){
  const total=data.reduce((a,d)=>a+d.value,0);if(!total)return'';
  let cum=0;const r=size/2,cr=r-2;
  const paths=data.map((d,i)=>{
    const pct=d.value/total;const start=cum;cum+=pct;
    if(pct>=.999)return`<circle cx="${r}" cy="${r}" r="${cr}" fill="${COLORS[i%COLORS.length]}"/>`;
    const st=start*Math.PI*2-Math.PI/2,en=(start+pct)*Math.PI*2-Math.PI/2;
    const x1=r+cr*Math.cos(st),y1=r+cr*Math.sin(st),x2=r+cr*Math.cos(en),y2=r+cr*Math.sin(en);
    return`<path d="M${r},${r} L${x1},${y1} A${cr},${cr} 0 ${pct>.5?1:0},1 ${x2},${y2} Z" fill="${COLORS[i%COLORS.length]}"/>`;
  }).join('');
  return`<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="display:block;margin:0 auto">${paths}</svg>`;
}
function pieLegend(data){
  const total=data.reduce((a,d)=>a+d.value,0);if(!total)return'';
  return data.map((d,i)=>`<div class="pie-legend-item"><div class="pie-legend-left"><div class="pie-legend-dot" style="background:${COLORS[i%COLORS.length]}"></div><span>${d.label}</span></div><span style="font-weight:500">${(d.value/total*100).toFixed(1)}%（${fmtYen(d.value)}）</span></div>`).join('');
}

    const soldTag=heldTickers.has(h.ticker)?'':' <span class="badge badge-normal">売却済み</span>';
    const hc=h.currency||'JPY';
    return`<div class="hist-item"><div><div style="font-size:13px;font-weight:500">${h.ticker}　${h.stockName}${soldTag}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${h.date}　${h.memo||''}</div></div><div style="display:flex;align-items:center;gap:8px"><div style="font-size:14px;font-weight:500;color:var(--green)">${fmtMoney(h.amount,hc)}</div><button class="del-btn" onclick="deleteHistory('${h.id}')">×</button></div></div>`}).join('')||'<div class="empty-state">配当の受取記録がありません。</div>';
  // 年別推移グラフ用データ（古い年→新しい年）
  const trendYears=Object.entries(byYear).sort((a,b)=>a[0].localeCompare(b[0]));
  const maxYearAmt=Math.max(...trendYears.map(([,v])=>v),1);
  const trendBars=trendYears.length>=1?trendYears.map(([yr,amt],i)=>{
    const prev=i>0?trendYears[i-1][1]:null;
    const growth=prev?((amt-prev)/prev*100):null;
    const growthTag=growth!==null?`<span style="font-size:11px;margin-left:6px" class="${growth>=0?'pos':'neg'}">${growth>=0?'▲':'▼'}${Math.abs(growth).toFixed(1)}%</span>`:'';
    return `<div class="bar-row"><div class="bar-ticker">${yr}年</div><div class="bar-track" style="height:26px"><div class="bar-fill" style="width:${amt/maxYearAmt*100}%;background:#1d9e75"></div></div><div style="flex-shrink:0;min-width:130px;font-size:12px;font-weight:500">${fmtYen(amt)}${growthTag}</div></div>`;
  }).join(''):'';
  el.innerHTML=`
    <div class="info-box"><strong>売却済み銘柄の配当</strong>：銘柄を削除しても履歴は「売却済み」バッジ付きで残り、合計に含まれ続けます。米国株の配当はドルのまま記録できます（集計時は自動で円換算）。</div>
    <div class="mg" style="grid-template-columns:repeat(3,1fr);margin-bottom:1.25rem">
      <div class="mc ac"><div class="ml">受取配当累計（円換算）</div><div class="mv">${fmtYen(totalH)}</div><div class="ms">${hist.length}件</div></div>
      <div class="mc"><div class="ml">年別受取状況</div><div style="margin-top:.5rem">${yearSummary}</div></div>
      <div class="mc"><div class="ml">最多受取銘柄</div><div class="mv" style="font-size:16px">${topStock()}</div></div>
    </div>
    ${trendBars?`<div class="card"><div class="sl">年別配当推移（前年比つき）</div><div class="bar-list">${trendBars}</div><p class="footnote" style="margin-top:.75rem">受取履歴から自動集計。▲▼は前年比の増減率です。</p></div>`:''}
    <div class="card"><div class="sl">配当を記録する</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">銘柄 *</label><select id="h-ticker" onchange="toggleOtherInput()"><option value="">選択</option>${stocks.map(s=>`<option value="${s.ticker}|${s.name}">${s.ticker} ${s.name}</option>`).join('')}<option value="__other__">その他（売却済み等）</option></select></div>
        <div class="form-group" id="other-name-group" style="display:none"><label class="form-label">銘柄名（自由入力）*</label><input id="h-other-name" placeholder="例: 9433 KDDI（売却済）"></div>
        <div class="form-group"><label class="form-label">受取日 *</label><input id="h-date" type="date" value="${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}"></div>
        <div class="form-group"><label class="form-label">受取金額（税引後）*</label><input id="h-amount" type="number" step="0.01" placeholder="例: 15000" min="0"></div>
        <div class="form-group"><label class="form-label">通貨</label><select id="h-currency"><option value="JPY">円（¥）</option><option value="USD">ドル（$）</option></select></div>
        <div class="form-group"><label class="form-label">メモ（任意）</label><input id="h-memo" placeholder="例: 中間配当"></div>
      </div>
      <button class="btn-primary" onclick="addHistory()">記録する</button>
    </div>
    <div class="card"><div class="sl">受取履歴</div>${histItems}</div>`;
}
function toggleOtherInput(){const v=document.getElementById('h-ticker').value;document.getElementById('other-name-group').style.display=v==='__other__'?'flex':'none'}
function topStock(){if(!hist.length)return'—';const rate=getRate();const bt={};hist.forEach(h=>{bt[h.ticker]=(bt[h.ticker]||0)+((h.currency||'JPY')==='USD'?h.amount*rate:h.amount)});const top=Object.entries(bt).sort((a,b)=>b[1]-a[1])[0];return top?`${top[0]} ${fmtYen(top[1])}`:'—'}
function addHistory(){
  const tv=document.getElementById('h-ticker').value,date=document.getElementById('h-date').value;
  const amount=parseFloat(document.getElementById('h-amount').value)||0,memo=document.getElementById('h-memo').value.trim();
  const currency=document.getElementById('h-currency').value;
  if(!tv||!date||!amount){alert('銘柄・受取日・金額は必須です');return}
  let ticker,stockName;
  if(tv==='__other__'){
    const on=document.getElementById('h-other-name').value.trim();
    if(!on){alert('銘柄名を入力してください');return}
    const parts=on.split(/\s+/);ticker=parts[0];stockName=parts.slice(1).join(' ')||parts[0];
  }else{[ticker,stockName]=tv.split('|')}
  hist.push({id:Date.now().toString(),ticker,stockName,date,amount,memo,currency});
  save(HK,hist);renderAll();showToast(`${stockName} の配当 ${fmtMoney(amount,currency)} を記録しました`);
}
function deleteHistory(id){if(!confirm('削除してよいですか？'))return;hist=hist.filter(h=>h.id!==id);save(HK,hist);renderAll()}

function renderAdd(){
  const el=document.getElementById('pane-add');
  const list=stocks.map(s=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:.6rem 0;border-bottom:.5px solid var(--border)"><div><span style="font-weight:500">${s.ticker}</span><span style="color:var(--text2);font-size:13px;margin-left:8px">${s.name}</span><span style="color:var(--text3);font-size:12px;margin-left:8px">${s.shares}${s.isFund?'万口':'株'}</span></div><button class="del-btn" onclick="deleteStock(${s.id})">× 削除</button></div>`).join('')||'<div style="font-size:13px;color:var(--text3);padding:.75rem 0">まだ銘柄がありません</div>';
  el.innerHTML=`
    <div class="card"><div class="sl">新規銘柄を追加</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">種類</label><select id="f-type"><option value="jp">日本株</option><option value="us">米国株</option><option value="fund">投資信託</option></select></div>
        <div class="form-group"><label class="form-label">口座区分</label><select id="f-account"><option value="特定口座">特定口座</option><option value="NISA">NISA</option><option value="旧NISA">旧NISA</option><option value="一般口座">一般口座</option></select></div>
        <div class="form-group"><label class="form-label">コード *</label><input id="f-ticker" placeholder="日本株:8306 / 米国株:AAPL / 投信:協会コード"></div>
        <div class="form-group" style="grid-column:span 2"><label class="form-label">銘柄名 *</label><input id="f-name" placeholder="例: 三菱UFJ FG"></div>
        <div class="form-group"><label class="form-label">保有数（投信は万口）*</label><input id="f-shares" type="number" step="0.0001" placeholder="例: 100" min="0.0001"></div>
        <div class="form-group"><label class="form-label">取得単価 *</label><input id="f-buy" type="number" step="0.01" placeholder="日本株:円 / 米国株:ドル" min="0"></div>
        <div class="form-group"><label class="form-label">現在株価/基準価額 *</label><input id="f-current" type="number" step="0.01" placeholder="更新ボタンで自動取得可" min="0"></div>
        <div class="form-group"><label class="form-label">1株配当/分配金（年間）</label><input id="f-div" type="number" step="0.01" placeholder="更新ボタンで自動取得可" min="0"></div>
        <div class="form-group" style="grid-column:span 2"><label class="form-label">権利落ち日（MM-DD、カンマ区切り）</label><input id="f-exdates" placeholder="例: 03-31,09-30"></div>
      </div>
      <button class="btn-primary" onclick="addStock()">追加する</button>
      <div class="info-box" style="margin-top:1rem;margin-bottom:0">
        <strong>投資信託の協会コードの調べ方</strong>：投資信託協会のサイト（toushin-lib.fwg.ne.jp）や、目論見書・証券会社の商品ページに記載されている8桁の英数字です。「ファンド名 協会コード」で検索してもすぐ見つかります。<br><br>
        <strong>代表的な協会コードの例</strong>：<br>
        ・eMAXIS Slim 全世界株式（オール・カントリー）→ <strong>0331418A</strong><br>
        ・eMAXIS Slim 米国株式（S&P500）→ <strong>03311187</strong><br><br>
        <strong>米国株</strong>：ティッカー（AAPL等）で追加。取得単価もドルで入力してください。表示はすべてドル建て、サマリー合計のみ円換算されます。
      </div>
    </div>
    <div class="card"><div class="sl">現在の保有銘柄</div>${list}</div>`;
}
function addStock(){
  const type=document.getElementById('f-type').value;
  const ticker=document.getElementById('f-ticker').value.trim(),name=document.getElementById('f-name').value.trim();
  const shares=parseFloat(document.getElementById('f-shares').value)||0,buyPrice=parseFloat(document.getElementById('f-buy').value)||0;
  const curPrice=parseFloat(document.getElementById('f-current').value)||0,annDiv=parseFloat(document.getElementById('f-div').value)||0;
  const exRaw=document.getElementById('f-exdates').value.trim(),exDates=exRaw?exRaw.split(',').map(d=>d.trim()).filter(Boolean):[];
  if(!ticker||!name||!shares||!buyPrice||!curPrice){alert('必須項目を入力してください（現在株価は仮の値でもOK。更新ボタンで自動取得されます）');return}
  const account=document.getElementById('f-account').value;
  const stock={id:Date.now(),ticker,name,shares,buyPrice,currentPrice:curPrice,annualDividend:annDiv,exDates,isFund:type==='fund',account};
  if(type==='us')stock.currency='USD';
  stocks.push(stock);
  save(SK,stocks);renderAll();showToast(`${name} を追加しました`);
}
function deleteStock(id){
  const s=stocks.find(s=>s.id===id);if(!s)return;
  const rcv=getReceivedDiv(s.ticker,curOf(s));
  const msg=rcv>0?`「${s.name}」を削除しますか？\n※受取済み配当 ${fmtMoney(rcv,curOf(s))} の履歴は残り、総受取額に含まれ続けます。`:`「${s.name}」を削除しますか？`;
  if(!confirm(msg))return;
  stocks=stocks.filter(s=>s.id!==id);save(SK,stocks);renderAll();
}

function renderSettings(){
  const el=document.getElementById('pane-settings');
  const cp=getProxyUrl(),rate=getRate();
  el.innerHTML=`
    <div class="card"><div class="sl">株価・配当の自動取得について</div>
      <div class="info-box">
        <strong>設定は不要です。</strong>「株価を更新」ボタンを押すだけで、無料の中継サービスを経由してYahoo Financeと投資信託協会からデータを自動取得します。<br><br>
        対応範囲：<br>
        ・日本株：株価＋年間配当（証券コードで自動取得）<br>
        ・米国株：株価＋年間配当（ティッカーで自動取得・ドル建て）<br>
        ・投資信託：基準価額＋年間分配金（協会コードで自動取得）<br>
        ・為替レート（ドル円）：自動取得<br><br>
        <strong>注意</strong>：無料の中継サービスを使うため、混雑時は取得に失敗することがあります。その場合は時間をおいて再度お試しください。
      </div>
    </div>
    <div class="card"><div class="sl">為替レート（米国株の円換算に使用）</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">ドル円レート（$1 = ¥）</label><input id="rate-input" type="number" step="0.01" value="${rate.toFixed(2)}"></div>
      </div>
      <button class="btn-primary" onclick="saveRate()">レートを保存</button>
      <p class="footnote" style="margin-top:.6rem">「株価を更新」で最新レートに自動更新されます。手動で上書きも可能です。</p>
    </div>
    <div class="card"><div class="sl">上級者向け：Google Apps Script中継（任意）</div>
      <div class="info-box">通常は不要ですが、中継サービスの調子が悪いときのための予備手段として、自分専用のGoogle Apps Script中継を設定できます。設定済みの場合はそちらが優先されます。</div>
      <div class="form-grid"><div class="form-group" style="grid-column:span 3"><label class="form-label">Google Apps ScriptのURL（任意）</label><input id="proxy-url" placeholder="https://script.google.com/macros/s/xxxxxx/exec" value="${cp}"></div></div>
      <button class="btn-primary" onclick="saveProxy()">URLを保存</button>
      ${cp?'<p class="footnote" style="margin-top:.6rem;color:var(--green)">✓ 設定済み（優先使用されます）</p>':''}
    </div>
    <div class="card"><div class="sl">データのバックアップ・復元</div>
      <div class="info-box">データはブラウザ内にのみ保存されるため、<strong>ブラウザの履歴削除やPCの買い替えで消える可能性があります。</strong>定期的にバックアップファイルを保存しておくと安心です。別の端末（スマホ⇔PC）へのデータ移行にも使えます。</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn-primary" style="flex:1;min-width:180px" onclick="exportData()">⬇ バックアップを保存</button>
        <button class="btn-primary" style="flex:1;min-width:180px;background:var(--bg);color:var(--text);border:.5px solid var(--border)" onclick="document.getElementById('import-file').click()">⬆ バックアップから復元</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      </div>
      <p class="footnote" style="margin-top:.6rem">保存されるもの：保有銘柄・配当受取履歴・為替レート設定。ファイル名は日付入りで自動生成されます。</p>
    </div>
    <div class="card"><div class="sl">データのリセット</div>
      <p style="font-size:12px;color:var(--text2);margin-bottom:.75rem">すべてのデータをデモ状態（メガバンク3社）に戻します。元に戻せません。</p>
      <button class="btn-primary" style="background:var(--red)" onclick="resetAll()">すべてのデータをリセット</button>
    </div>`;
}
function saveRate(){const r=parseFloat(document.getElementById('rate-input').value);if(r&&r>0){localStorage.setItem(RK,String(r));renderAll();showToast(`✓ レートを $1=¥${r.toFixed(2)} に設定しました`)}else{alert('正しい数値を入力してください')}}
function saveProxy(){const url=document.getElementById('proxy-url').value.trim();if(url)localStorage.setItem(PK,url);else localStorage.removeItem(PK);renderSettings();showToast(url?'✓ 保存しました':'URLを削除しました')}
function resetAll(){if(!confirm('本当にリセットしますか？'))return;localStorage.removeItem(SK);localStorage.removeItem(HK);stocks=JSON.parse(JSON.stringify(DEF_STOCKS));hist=JSON.parse(JSON.stringify(DEF_HIST));save(SK,stocks);save(HK,hist);renderAll();showToast('リセットしました')}

// ── バックアップ・復元 ─────────────────────
function exportData(){
  const data={app:'dividend-portfolio',version:1,exportedAt:new Date().toISOString(),stocks,hist,usdjpy:localStorage.getItem(RK)||null};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url;
  a.download=`配当ポートフォリオ_バックアップ_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✓ バックアップファイルを保存しました');
}
function importData(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.app!=='dividend-portfolio'||!Array.isArray(data.stocks)){alert('このファイルは配当ポートフォリオのバックアップではないようです');return}
      if(!confirm(`バックアップから復元しますか？\n（銘柄${data.stocks.length}件・配当履歴${(data.hist||[]).length}件）\n※現在のデータは上書きされます`))return;
      stocks=data.stocks;hist=data.hist||[];
      save(SK,stocks);save(HK,hist);
      if(data.usdjpy)localStorage.setItem(RK,data.usdjpy);
      renderAll();showToast('✓ バックアップから復元しました');
    }catch(err){alert('ファイルの読み込みに失敗しました。正しいバックアップファイルか確認してください。')}
  };
  reader.readAsText(file);
  event.target.value='';
}

renderAll();
</script>
</body>
</html>
